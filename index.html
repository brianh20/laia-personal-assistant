<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laia</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0b1020;
      --fg: #f8fafc;
      --accent: #8b5cf6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(139,92,246,0.35), transparent 35%),
        linear-gradient(160deg, #0b1020, #111827 50%, #0f172a);
      color: var(--fg);
    }
    main {
      padding: 3rem;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 80px rgba(0,0,0,0.35);
      text-align: center;
      max-width: 900px;
      width: min(90vw, 900px);
    }
    h1 {
      margin: 0;
      font-size: clamp(2rem, 6vw, 4.5rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }
    .accent { color: #c4b5fd; }
  </style>
</head>
<body>
  <main>
    <h1>I am <span class="accent">Laia</span>, I’ll build this website.</h1>
  </main>
</body>
</html>
